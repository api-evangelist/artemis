name: Artemis API
description: APIs for NASA's Artemis program - the next generation of lunar exploration missions
url: https://api.nasa.gov/artemis
image: https://www.nasa.gov/wp-content/uploads/2023/03/artemis-logo.png
created: '2024-01-15'
modified: '2024-01-15'
apis:
- name: Artemis Mission Data API
  description: Access data about Artemis missions including mission plans, schedules, and status updates
  baseURL: https://api.nasa.gov/artemis/v1/missions
  humanURL: https://www.nasa.gov/artemis
  image: https://www.nasa.gov/wp-content/uploads/2023/03/artemis-mission-patch.png
  version: v1
  tags:
  - space
  - moon
  - exploration
  - artemis
  - missions
  properties:
  - type: Documentation
    url: https://api.nasa.gov/artemis/docs
  - type: OpenAPI
    url: https://api.nasa.gov/artemis/v1/openapi.json
  - type: Authentication
    url: https://api.nasa.gov/artemis/auth
  contact:
  - type: Support
    url: https://api.nasa.gov/artemis/support
  - type: Email
    url: mailto:artemis-api@nasa.gov
- name: Artemis Spacecraft Telemetry API
  description: Real-time and historical telemetry data from Artemis spacecraft including Orion capsule and SLS rocket
  baseURL: https://api.nasa.gov/artemis/v1/telemetry
  humanURL: https://www.nasa.gov/artemis/spacecraft
  version: v1
  tags:
  - telemetry
  - spacecraft
  - orion
  - sls
  - real-time
  properties:
  - type: Documentation
    url: https://api.nasa.gov/artemis/docs/telemetry
  - type: OpenAPI
    url: https://api.nasa.gov/artemis/v1/telemetry/openapi.json
  - type: WebSocket
    url: wss://api.nasa.gov/artemis/v1/telemetry/stream
  contact:
  - type: Support
    url: https://api.nasa.gov/artemis/support
- name: Artemis Lunar Gateway API
  description: Information about the Lunar Gateway space station including modules, experiments, and docking schedules
  baseURL: https://api.nasa.gov/artemis/v1/gateway
  humanURL: https://www.nasa.gov/gateway
  version: v1
  tags:
  - gateway
  - space-station
  - lunar-orbit
  - international
  properties:
  - type: Documentation
    url: https://api.nasa.gov/artemis/docs/gateway
  - type: OpenAPI
    url: https://api.nasa.gov/artemis/v1/gateway/openapi.json
  contact:
  - type: Support
    url: https://api.nasa.gov/artemis/support
- name: Artemis Astronaut API
  description: Information about Artemis astronauts, crew assignments, training schedules, and biographies
  baseURL: https://api.nasa.gov/artemis/v1/astronauts
  humanURL: https://www.nasa.gov/artemis/astronauts
  version: v1
  tags:
  - astronauts
  - crew
  - training
  - personnel
  properties:
  - type: Documentation
    url: https://api.nasa.gov/artemis/docs/astronauts
  - type: OpenAPI
    url: https://api.nasa.gov/artemis/v1/astronauts/openapi.json
  contact:
  - type: Support
    url: https://api.nasa.gov/artemis/support
