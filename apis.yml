aid: artemis
name: Artemis
description: >-
  NASA's Artemis program is the next generation of lunar exploration, aiming to
  return humans to the Moon and establish a sustainable presence for future
  missions to Mars. The program includes the Space Launch System (SLS) rocket,
  Orion spacecraft, the Lunar Gateway space station, and commercial lunar landers
  from SpaceX and Blue Origin. NASA's Open APIs provide programmatic access to
  Artemis-related data, including mission imagery, space weather, and planetary
  data through api.nasa.gov. The program operates under NASA's Science Mission
  Directorate and Exploration Systems Development Mission Directorate.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
